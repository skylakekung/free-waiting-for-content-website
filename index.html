<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal Video Player</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: black;
      position: relative;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .text {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Rounded", sans-serif;
      color: white;
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      border: none;
      overflow: hidden;
      background: transparent;
      z-index: 10;
      font-size: 55px;
    }

    .clock-frame {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 1270px;
      height: 900px;
      border: none;
      overflow: hidden;
      background: transparent;
      z-index: 10;
    }
  </style>
</head>
<body>

  <video autoplay muted loop playsinline>
    <source src="video.mp4" type="video/mp4">
  </video>

  <iframe
    class="clock-frame"
    src="https://skylakekung.github.io/freeclockhtml/"
    allowtransparency="true">
  </iframe>
  <p class="text">
    Waiting for content...
  </p>

</body>
</html>
